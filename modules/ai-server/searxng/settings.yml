# Minimal SearXNG settings for Open WebUI integration.
# Two things this file does that the upstream default doesn't:
#   1. Enables JSON output (required by Open WebUI's web-search consumer)
#   2. Leaves `secret_key` out so the SEARXNG_SECRET env var (generated by
#      ai-server-secrets.service) is the source of truth.
# Everything else stays at upstream defaults — the active list of engines,
# safe search policy, locale heuristics, etc.

use_default_settings: true

server:
  bind_address: "0.0.0.0"
  port: 8080
  # secret_key is read from the SEARXNG_SECRET env var at startup.
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json   # required for Open WebUI

ui:
  static_use_hash: true

# Open WebUI uses the JSON output and then has its own LLM re-rank/select
# the most relevant snippets, so we don't aggressively filter engines here.
